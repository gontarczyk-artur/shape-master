<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shape Master</title><link rel="stylesheet" href="fonts/fonts.min.css"><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/theme.min.css"><link rel="manifest" href="manifest.json"><style>#game-canvas{display:block;width:100%;max-width:400px;height:auto;min-height:200px;aspect-ratio:1/1;margin-inline:auto;touch-action:none}#error-box{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 18px;border-radius:12px;display:none;font-size:15px;z-index:9999}</style></head><body class="bg-light"><div class="container py-3"><nav class="navbar navbar-dark bg-dark px-3 mb-3"><span class="navbar-brand">Shape&nbsp;Master</span> <button class="btn btn-outline-light btn-sm" data-action="showDailyRankings">Rankingi</button></nav><div id="menu-screen" class="screen d-block"><div class="card mb-3"><p class="eyebrow">Ćwiczenie z precyzji</p><h2 class="mb-1">Narysuj idealne koło</h2><p class="text-muted mb-4" style="font-size:.92rem">Jednym pociągnięciem palca. Bez odrywania. Zmierzymy resztę.</p><button class="btn btn-primary w-100 mb-2" data-action="startSolo">Zagraj solo</button> <button class="btn btn-secondary w-100 mb-2" data-action="showMultiplayerSetup">Gra na zmiany</button> <button class="btn btn-warning w-100" data-action="showDailyRankings">Rankingi dzienne</button></div></div><div id="multiplayer-setup-screen" class="screen d-none"><div class="card mb-3"><p class="eyebrow">Konfiguracja</p><h4 class="mb-3">Ilu graczy przy stole?</h4><div class="d-grid gap-2 mb-3" role="group" aria-label="Liczba graczy"><button class="btn btn-outline-primary" data-action="generatePlayerInputs" data-arg="2">2 graczy</button> <button class="btn btn-outline-primary" data-action="generatePlayerInputs" data-arg="3">3 graczy</button> <button class="btn btn-outline-primary" data-action="generatePlayerInputs" data-arg="4">4 graczy</button></div><label class="form-label" for="round-count">Rundy na gracza</label> <input id="round-count" type="number" class="form-control mb-3" min="1" value="1"><div id="dynamic-inputs"></div><button id="start-multi-btn" class="btn btn-success w-100 mt-2" style="display:none" data-action="startMultiplayer">Zaczynamy</button> <button class="btn btn-secondary w-100 mt-2" data-action="showScreen" data-arg="menu-screen">Powrót</button></div></div><div id="game-screen" class="screen d-none"><div class="card mb-3"><h4 id="turn-indicator" class="mb-3">Tura gracza:</h4><div id="draw-status" class="alert alert-info text-center py-2 mb-3" style="min-height:44px">Gotowy do rysowania</div><canvas id="game-canvas"></canvas><div id="score-readout" class="score-readout d-none"><p class="eyebrow mb-1">Dokładność</p><div class="score-value"><span id="score-number">0</span><span class="pct">%</span></div><div id="score-verdict" class="score-verdict"></div></div></div><button class="btn btn-secondary w-100" data-action="showScreen" data-arg="menu-screen">Przerwij</button></div><div id="leaderboard-screen" class="screen d-none"><p class="eyebrow">Dziennik pomiarów</p><h2 class="mb-3">Rankingi dzienne</h2><div class="accordion" id="leaderboard-accordion"><div class="accordion-item"><h2 class="accordion-header" id="solo-heading"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#solo-collapse">Solo</button></h2><div id="solo-collapse" class="accordion-collapse collapse"><div class="accordion-body" id="solo-results"></div></div></div><div class="accordion-item mt-2"><h2 class="accordion-header" id="multi-heading"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#multi-collapse">Gra na zmiany</button></h2><div id="multi-collapse" class="accordion-collapse collapse"><div class="accordion-body" id="multi-results"></div></div></div></div><div class="row g-2 mt-3"><div class="col-6"><button class="btn btn-danger btn-sm w-100" data-action="clearDay" data-arg="solo">Wyczyść solo</button></div><div class="col-6"><button class="btn btn-danger btn-sm w-100" data-action="clearDay" data-arg="multi">Wyczyść zmiany</button></div></div><button class="btn btn-danger btn-sm w-100 mt-2" data-action="clearOld">Wyczyść wcześniejsze dni</button> <button class="btn btn-secondary w-100 mt-3" data-action="showScreen" data-arg="menu-screen">Powrót do menu</button></div></div><div id="error-box"></div><script src="js/app.min.js"></script><script src="js/bootstrap.bundle.min.js"></script><script>"serviceWorker"in navigator&&navigator.serviceWorker.register("sw.js")</script></body></html>
